<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCD 10M keatas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>Secondary Jawa Timur</h1>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Cari Property">
            <select id="filterDropdown">
                <option value="semua">Semua Kategori</option>
                <option value="Rumah">🏠 Rumah</option>
                <option value="Apartment">🏢 Apartment</option>
                <option value="Tanah">🌳 Tanah</option>
                <option value="Gudang">🏬 Gudang</option>
                <option value="Ruko">🏪 Ruko</option>
                <option value="Pabrik">🏭 Pabrik</option>
                <option value="Rumah Usaha">🏪 Rumah Usaha</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="gallery" id="gallery">
            <div class="photo-card" data-name="Tanah">
                <img src="scd-jawa-timur-1M-10M.jpeg" alt="Tanah">
                <div class="info">Tanah</div>
                <div class="container-text">
                    <h3>*Secondary Jawa Timur*</h3>
                    <div class="deskripsi">
                        Tanah Raya Tuban-Surabaya, Tuban <br>
                        Luas 4Ha(100x400) <br>
                        SHM <br>
                        Harga 39,2 M <br>
                        (980rb/m2)</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
