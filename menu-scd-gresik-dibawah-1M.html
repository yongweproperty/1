<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YongWeProperty</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>Secondary Gresik</h1>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Cari Property">
            <select id="filterDropdown">
                <option value="semua">Semua Kategori</option>
                <option value="Rumah">🏠 Rumah</option>
                <option value="Apartemen">🏢 Apartemen</option>
                <option value="Tanah">🌳 Tanah</option>
                <option value="Gudang">🏬 Gudang</option>
                <option value="Ruko">🏪 Ruko</option>
                <option value="Pabrik">🏭 Pabrik</option>
                <option value="Rumah Usaha">🏪 Rumah Usaha</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="gallery" id="gallery">
            <div class="photo-card" data-name="Rumah">
                <img src="scd-grs-dibawah-1M.jpeg" alt="Rumah">
                <div class="info">Rumah</div>
                <div class="container-text">
                    <h3>*Secodary Gresik*</h3>
                    <div class="deskripsi">
                        Impian Residence, Menganti <br>
                        Luas Tanah 77(7x11) <br>
                        Luas Bangunan 42 <br>
                        SHM, Hadap Barat <br>
                        Kamar Tidur 2 <br>
                        Kamar Mandi 1 <br>
                        Row 2 Mobil <br>
                        Harga 400 Juta Nego <br> <br>

                        Segera Hubungi: <br>
                        YongWe Property</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
