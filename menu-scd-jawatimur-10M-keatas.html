<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCD 10M keatas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>Secondary Jawa Timur</h1>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Cari Property">
            <select id="filterDropdown">
                <option value="semua">Semua Kategori</option>
                <option value="Rumah">🏠 Rumah</option>
                <option value="Apartment">🏢 Apartment</option>
                <option value="Tanah">🌳 Tanah</option>
                <option value="Gudang">🏬 Gudang</option>
                <option value="Ruko">🏪 Ruko</option>
                <option value="Pabrik">🏭 Pabrik</option>
                <option value="Rumah Usaha">🏪 Rumah Usaha</option>
            </select>
        </div>
    </div>

    <div class="gallery">
        <div class="container" id="gelery">

            <div class="photo-card" data-name="Tanah">

                <div class="slider-wrapper" title="Klik untuk melihat foto selanjutnya">
                    <div class="slider-track">
                        <!-- Saya ubah ke foto 2 agar sesuai dengan daftar gambar di foldermu -->
                        <img src="scd-jawa-timur-1M-10M.jpeg" alt="Tampak Depan">
                        <img src="foto 2 (2).jpeg" alt="Tampak Dalam">
                        <img src="foto 2 (1).jpeg" alt="Fasilitas">
                    </div>
                    <div class="click-hint">Klik foto 👆</div>
                </div>

                <!-- Area Spesifikasi / Teks -->
                <div class="card-content">
                    <span class="badge-lokasi">Tanah Raya Tuban-Surabaya, Tuban</span>
                    <h2 class="card-title">Tanah Raya Tuban-Surabaya</h2>

                    <div class="card-specs">
                        <p><strong>LT:</strong>4HA (100x400)| <strong>LB:</strong> 0 m²</p>
                        <p><strong>Lantai: 1</strong> | <strong>Surat:</strong> SHM</p>
                        <p><strong>Kamar Tidur: 0</strong> | <strong>Kamar Mandi: 0</strong></p>
                        <br>
                        <p>Segera Hubungi: <br>
                            YongWe Property</p>
                    </div>

                    <div class="card-price">
                        <span class="harga-promo">Rp 39,2 M<small></small></span>
                        <span class="harga-promo"><small>(980rb/m2)</small></span>
                        <p class="pajak-info">Belum Termasuk Pajak & Biaya2</p>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
