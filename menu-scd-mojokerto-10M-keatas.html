<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YongWeProperty</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>Secondary Sidoarjo</h1>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="Cari Property">
            <select id="filterDropdown">
                <option value="semua">Semua Kategori</option>
                <option value="Rumah">🏠 Rumah</option>
                <option value="Apartment">🏢 Apartment</option>
                <option value="Tanah">🌳 Tanah</option>
                <option value="Gudang">🏬 Gudang</option>
                <option value="Ruko">🏪 Ruko</option>
                <option value="Pabrik">🏭 Pabrik</option>
                <option value="Rumah Usaha">🏪 Rumah Usaha</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="gallery" id="gallery">
            <div class="photo-card" data-name="Tanah">
                <img src="scd-mjt-10M-keatas.jpeg" alt="Tanah">
                <div class="info">Tanah</div>
                <div class="container-text">
                    <h3>*Secondary Mojokerto*</h3>
                    <div class="deskripsi">
                        *Kedungsari, Magersari, Mojokerto Kota* <br>
                        Luas Tanah 17160 <br>
                        Lebar Jalan 2 mobil <br>
                        300m By Pass Mojokerto(sebelah gudang Superindo) <br>
                        Harga 29 M <br>
                        (1,6 jutaan/m2) <br> <br>

                        Segera Hubungi: <br>
                        YongWe Property</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
